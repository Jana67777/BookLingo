{% extends 'base.html' %}

{% block title %}注册 BookLingo{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-md mt-10">
    <h2 class="text-2xl font-bold text-center mb-6">创建新账号</h2>
    <form method="POST" action="{{ url_for('register') }}">
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2" for="username">
                用户名
            </label>
            <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500" id="username" name="username" type="text" placeholder="设置用户名" required>
        </div>
        <div class="mb-6">
            <label class="block text-gray-700 text-sm font-bold mb-2" for="password">
                密码
            </label>
            <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 mb-3 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500" id="password" name="password" type="password" placeholder="设置密码" required>
        </div>
        <div class="flex items-center justify-between">
            <button class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline transition" type="submit">
                注 册
            </button>
        </div>
        <div class="mt-4 text-center">
            <span class="text-gray-600 text-sm">已有账号？</span>
            <a href="{{ url_for('login') }}" class="text-blue-600 hover:text-blue-800 text-sm font-bold">直接登录</a>
        </div>
    </form>
</div>
{% endblock %}
